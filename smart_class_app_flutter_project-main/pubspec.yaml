name: smart_class
description: Smart Classroom Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0

  # Location / GPS
  geolocator: ^12.0.0

  # QR
  qr_flutter: ^4.1.0          # Generate QR (instructor)
  mobile_scanner: ^5.1.0      # Scan QR (student)

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # Add Poppins font if available; otherwise the app gracefully falls back
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Medium.ttf   weight: 500
  #       - asset: assets/fonts/Poppins-SemiBold.ttf weight: 600
  #       - asset: assets/fonts/Poppins-Bold.ttf     weight: 700
  #       - asset: assets/fonts/Poppins-ExtraBold.ttf weight: 800
